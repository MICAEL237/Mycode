<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark">
  


   <div class="vh-100 d-flex">

    <div class="w-50 m-auto bg-dark text-white p-4 shadow rounded  ">
        <div class=" vw-50 mx-auto mt-1  text-center mb-4">
                <h2>Register</h2>
        </div>
         <form class="" action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="row">
                <div class="col ">
                    <input type="submit" class="form-control btn btn-primary  mt-4 " value="Creer le compte">
                </div>
                 <div class="col d-grid" >
                    <button type="button" class="btn btn-primary btn-block btn-sm"><a class="nav-link"  href="{% url 'login' %}">Se connecter</a></button>
                    
                </div>
            </div>
            
        </form>
     
    </div>
</div>
</body>
</html>
